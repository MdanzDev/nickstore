<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick-Store · topup & credits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0d12;
            --bg-surface: #11151e;
            --bg-card: #141a24;
            --accent: #2b87ff;
            --accent-soft: rgba(43, 135, 255, 0.1);
            --border-dim: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f4ff;
            --text-secondary: #a0aaba;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .glass-nav {
            background: rgba(11, 13, 18, 0.98);
            border-bottom: 1px solid var(--border-dim);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-font {
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        .game-card:active { background: #1e2632; }

        .category-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 100px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .category-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .denom-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            padding: 14px 12px;
            text-align: left;
            transition: all 0.1s ease;
            width: 100%;
            cursor: pointer;
        }
        .denom-btn.selected {
            background: var(--accent-soft);
            border: 1px solid var(--accent);
        }

        .modal-content {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #0f131c;
            border-radius: 28px 28px 0 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.25s ease-out;
            z-index: 1001;
        }
        .modal-content.active { transform: translateY(0); }

        .cart-sidebar {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 100%; max-width: 400px;
            background: #0e121a;
            border-left: 1px solid var(--border-dim);
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            z-index: 1001;
            display: flex; flex-direction: column;
        }
        .cart-sidebar.active { transform: translateX(0); }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(3px);
            z-index: 1000;
            display: none;
        }
        .modal-overlay.active { display: block; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%) translateY(100px);
            background: #1e2c3a; color: white; 
            padding: 12px 28px; border-radius: 100px;
            font-weight: 500; font-size: 14px; z-index: 10000;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .loading-screen {
            position: fixed; inset: 0;
            background: var(--bg-main);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        @media (min-width: 640px) { .game-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .game-grid { grid-template-columns: repeat(4, 1fr); } }

        input, button { outline: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="text-center">
            <div class="w-14 h-14 border-3 border-white/10 border-t-[#2b87ff] rounded-full animate-spin mx-auto mb-4"></div>
            <h3 class="logo-font text-xl font-black tracking-tight">NICK·STORE</h3>
            <p id="loadingText" class="text-xs text-gray-500 mt-3">loading...</p>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="glass-nav px-5 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-end gap-1 cursor-pointer" onclick="showView('games')">
                <h1 class="logo-font font-black text-2xl text-white">NICK·STORE</h1>
                <span class="text-[10px] text-gray-500 mb-1 ml-1">topup</span>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="toggleSearch()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <i class="fas fa-search text-sm text-gray-300"></i>
                </button>
                <button onclick="openCart()" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <i class="fas fa-shopping-cart text-sm"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-[#2b87ff] text-white text-[10px] font-bold w-4.5 h-4.5 flex items-center justify-center rounded-full">0</span>
                </button>
                <button onclick="showView('history')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <i class="fas fa-clock text-sm"></i>
                </button>
            </div>
        </div>
        <div id="searchBar" class="max-w-7xl mx-auto mt-4 hidden">
            <input type="text" id="gameSearch" oninput="handleSearch(this.value)" placeholder="Search games..." 
                class="w-full bg-[#1a1f2a] border border-white/10 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-[#2b87ff]/70">
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto">
        <!-- GAMES VIEW -->
        <div id="view-games" class="max-w-7xl mx-auto p-5">
            <!-- Simple header -->
            <div class="mb-6">
                <h2 class="text-2xl font-bold tracking-tight">Game credits</h2>
                <p class="text-sm text-gray-500 mt-1">Instant delivery • verified</p>
            </div>

            <!-- Categories -->
            <div class="category-scroll overflow-x-auto flex gap-2 mb-6 pb-1" id="categoryContainer"></div>

            <!-- Game grid -->
            <div id="gameGrid" class="game-grid"></div>
            <div id="emptyState" class="hidden text-center py-20">
                <p class="text-gray-500 text-sm">no games found</p>
            </div>
        </div>

        <!-- HISTORY VIEW (clean) -->
        <div id="view-history" class="hidden max-w-2xl mx-auto p-5">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showView('games')" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5"><i class="fas fa-arrow-left text-sm"></i></button>
                <h2 class="text-xl font-bold">Order history</h2>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </main>

    <!-- PRODUCT MODAL -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="productModal" class="modal-content">
        <div class="p-6">
            <div class="flex justify-between items-start mb-6">
                <div class="flex gap-4">
                    <div id="modalImg" class="w-16 h-16 rounded-xl bg-cover bg-center border border-white/10"></div>
                    <div>
                        <h3 id="modalTitle" class="text-lg font-bold">Game</h3>
                        <p id="modalCategory" class="text-xs text-gray-500 mt-0.5">category</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5"><i class="fas fa-times"></i></button>
            </div>

            <div class="space-y-6">
                <!-- Player ID -->
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2 block">Player ID</label>
                    <input type="text" id="playerId" placeholder="Enter user ID / nickname" 
                        class="w-full bg-[#1a202c] border border-white/10 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-[#2b87ff]/70">
                </div>

                <!-- Denominations - FIXED: fully clickable, no js glitch -->
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3 block">Select package</label>
                    <div id="denomGrid" class="grid grid-cols-2 gap-3"></div>
                </div>

                <button onclick="addToCart()" class="w-full bg-[#2b87ff] hover:bg-[#1a7aff] text-white py-4 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
                    <i class="fas fa-cart-plus"></i> ADD TO CART
                </button>
            </div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div id="cartOverlay" class="modal-overlay" onclick="closeCart()"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <h3 class="font-bold text-base">Shopping cart</h3>
            <button onclick="closeCart()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center"><i class="fas fa-times text-sm"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-5 bg-black/30 border-t border-white/10">
            <div class="flex justify-between mb-4">
                <span class="text-gray-400 text-sm">Total</span>
                <span id="cartTotal" class="text-xl font-bold text-white">RM 0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-[#2b87ff] hover:bg-[#1a7aff] text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> CHECKOUT
            </button>
        </div>
    </div>

    <div id="toast" class="toast">Item added</div>

    <script>
        // ===== NICK·STORE =====
        // FIXED: denom buttons are 100% clickable, no glitch, removed cringe text

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEzcyRUGrj5Z6kL-2Ms19p_Kwi-hcdHp1SAMG9XcxA7dNbih2PyB1l8uQamxpEP3NVSuN1aJj4_oi1/pub?output=csv';
        const WA_NUMBER = '60137345871';

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('nick_cart')) || [];
        let history = JSON.parse(localStorage.getItem('nick_history')) || [];
        let selectedGame = null;
        let selectedProduct = null;
        let currentCategory = 'all';

        window.onload = () => { fetchData(); updateCartUI(); };

        async function fetchData() {
            const loadingText = document.getElementById('loadingText');
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allProducts = results.data.map((item, index) => ({
                            id: item.id || `prod-${index}-${Date.now()}`,
                            name: item.name || 'Diamonds',
                            game: item.game || 'Unknown Game',
                            price: parseFloat(String(item.price || '5').replace(/[^\d.-]/g, '')) || 9.99,
                            category: item.cat || 'Others',
                            image: item.thumbnail || `https://ui-avatars.com/api/?name=${encodeURIComponent(item.game || 'G')}&background=2b87ff&color=fff&size=200`
                        }));
                        renderCategories();
                        renderGames();
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } catch (e) {
                // fallback data
                allProducts = [
                    { id: 'ml1', name: '86 Diamonds', game: 'Mobile Legends', price: 12.90, category: 'MOBA', image: 'https://ui-avatars.com/api/?name=ML&background=2b87ff&color=fff' },
                    { id: 'ml2', name: '172 Diamonds', game: 'Mobile Legends', price: 24.90, category: 'MOBA', image: 'https://ui-avatars.com/api/?name=ML&background=2b87ff&color=fff' },
                    { id: 'gi1', name: '60 Crystals', game: 'Genshin Impact', price: 16.90, category: 'RPG', image: 'https://ui-avatars.com/api/?name=GI&background=2b87ff&color=fff' },
                    { id: 'gi2', name: '300 Crystals', game: 'Genshin Impact', price: 29.90, category: 'RPG', image: 'https://ui-avatars.com/api/?name=GI&background=2b87ff&color=fff' },
                    { id: 'fn1', name: '1000 V-Bucks', game: 'Fortnite', price: 35.00, category: 'Battle', image: 'https://ui-avatars.com/api/?name=FN&background=2b87ff&color=fff' }
                ];
                renderCategories();
                renderGames();
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        // CATEGORIES
        function renderCategories() {
            const cats = ['all', ...new Set(allProducts.map(p => p.category))];
            const container = document.getElementById('categoryContainer');
            container.innerHTML = cats.map(cat => `
                <button onclick="setCategory('${cat}')" class="category-btn ${currentCategory === cat ? 'active' : ''}">
                    ${cat === 'all' ? 'All' : cat}
                </button>
            `).join('');
        }

        function setCategory(cat) { currentCategory = cat; renderCategories(); renderGames(); }

        // GAME GRID
        function renderGames(search = '') {
            const grid = document.getElementById('gameGrid');
            const uniqueGames = [...new Set(allProducts.map(p => p.game))];
            
            const filtered = uniqueGames.filter(gameName => {
                const gameProducts = allProducts.filter(p => p.game === gameName);
                const matchesCat = currentCategory === 'all' || (gameProducts[0]?.category === currentCategory);
                const matchesSearch = gameName.toLowerCase().includes(search.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            grid.innerHTML = filtered.map(gameName => {
                const gameData = allProducts.find(p => p.game === gameName) || allProducts[0];
                const prices = allProducts.filter(p => p.game === gameName).map(p => p.price);
                const minPrice = prices.length ? Math.min(...prices) : 0;
                return `
                    <div class="game-card p-3 flex flex-col cursor-pointer" onclick="openGame('${gameName.replace(/'/g, "\\'")}')">
                        <div class="aspect-square w-full rounded-xl bg-cover bg-center mb-3 border border-white/5" style="background-image: url('${gameData.image}')"></div>
                        <div class="px-0.5">
                            <h4 class="font-semibold text-sm truncate">${gameName}</h4>
                            <p class="text-xs text-gray-400 mt-1">RM ${minPrice.toFixed(2)}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // OPEN MODAL
        function openGame(gameName) {
            selectedGame = gameName;
            const variants = allProducts.filter(p => p.game === gameName);
            if (variants.length === 0) return;

            const gameData = variants[0];
            document.getElementById('modalTitle').innerText = gameName;
            document.getElementById('modalCategory').innerText = gameData.category || 'Game';
            document.getElementById('modalImg').style.backgroundImage = `url('${gameData.image}')`;
            document.getElementById('playerId').value = '';

            // DENOM GRID - FULLY CLICKABLE FIX
            const denomGrid = document.getElementById('denomGrid');
            denomGrid.innerHTML = variants.map((p, i) => `
                <button type="button" onclick="selectProduct('${p.id}')" id="btn-${p.id}" 
                    class="denom-btn w-full text-left">
                    <span class="text-xs font-medium text-gray-300">${p.name}</span>
                    <span class="text-base font-bold text-white block mt-1.5">RM ${p.price.toFixed(2)}</span>
                </button>
            `).join('');

            // select first product by default
            if (variants.length > 0) {
                selectProduct(variants[0].id);
            }

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('productModal').classList.add('active');
        }

        // SELECT PRODUCT - REMOVED GLITCH, CLEAN HIGHLIGHT
        function selectProduct(id) {
            // remove selected class from all
            document.querySelectorAll('.denom-btn').forEach(btn => {
                btn.classList.remove('selected', 'bg-[#2b87ff]/10', 'border-[#2b87ff]');
            });
            
            // add selected class to current
            const currentBtn = document.getElementById(`btn-${id}`);
            if (currentBtn) {
                currentBtn.classList.add('selected', 'bg-[#2b87ff]/10', 'border-[#2b87ff]');
                selectedProduct = allProducts.find(p => p.id === id);
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('productModal').classList.remove('active');
        }

        // ADD TO CART
        function addToCart() {
            const pid = document.getElementById('playerId').value.trim();
            if (!pid) {
                showToast('Enter player ID');
                return;
            }
            if (!selectedProduct) {
                showToast('Select a package');
                return;
            }

            cart.push({
                cartId: Date.now() + Math.random(),
                game: selectedGame,
                product: selectedProduct.name,
                price: selectedProduct.price,
                playerId: pid,
                image: selectedProduct.image
            });

            saveCart();
            closeModal();
            showToast('Added to cart');
            updateCartUI();
        }

        // CART UI
        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            document.getElementById('cartCount').innerText = cart.length;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500 text-sm">Cart is empty</div>`;
                totalEl.innerText = "RM 0.00";
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="flex gap-3 bg-[#1a202c] p-3.5 rounded-xl border border-white/5">
                        <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1 min-w-0">
                            <h5 class="text-sm font-semibold truncate">${item.game}</h5>
                            <p class="text-xs text-gray-400 mt-0.5">${item.product}</p>
                            <p class="text-xs text-gray-500 mt-1.5 font-mono">ID: ${item.playerId}</p>
                        </div>
                        <div class="text-right flex flex-col justify-between">
                            <span class="text-sm font-bold">RM${item.price.toFixed(2)}</span>
                            <button onclick="removeFromCart(${item.cartId})" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            totalEl.innerText = `RM ${total.toFixed(2)}`;
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.cartId !== id);
            saveCart();
            updateCartUI();
            showToast('Removed');
        }

        function saveCart() { localStorage.setItem('nick_cart', JSON.stringify(cart)); }
        function openCart() { document.getElementById('cartOverlay').classList.add('active'); document.getElementById('cartSidebar').classList.add('active'); }
        function closeCart() { document.getElementById('cartOverlay').classList.remove('active'); document.getElementById('cartSidebar').classList.remove('active'); }

        function checkout() {
            if (cart.length === 0) return showToast('Cart empty');

            let message = "*NICK·STORE ORDER*%0A";
            let total = 0;
            cart.forEach((item, i) => {
                message += `${i+1}. ${item.game} - ${item.product}%0A`;
                message += `   ID: ${item.playerId}%0A`;
                message += `   RM${item.price.toFixed(2)}%0A%0A`;
                total += item.price;
            });
            message += `*TOTAL: RM ${total.toFixed(2)}*`;

            const order = { id: Date.now(), items: [...cart], total, date: new Date().toLocaleDateString('en-MY') };
            history.unshift(order);
            localStorage.setItem('nick_history', JSON.stringify(history));

            cart = [];
            saveCart();
            updateCartUI();
            closeCart();
            window.open(`https://wa.me/${WA_NUMBER}?text=${message}`, '_blank');
            showToast('Order sent');
        }

        function showView(view) {
            document.getElementById('view-games').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view === 'history') renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (history.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-10 text-sm">No history yet</p>`;
                return;
            }
            container.innerHTML = history.map(order => `
                <div class="bg-[#151b26] border border-white/5 p-4 rounded-2xl">
                    <div class="flex justify-between mb-3">
                        <span class="text-xs text-gray-500">${order.date}</span>
                        <span class="text-sm font-bold text-white">RM${order.total?.toFixed(2)}</span>
                    </div>
                    <div class="space-y-2">
                        ${order.items?.map(item => `
                            <div class="text-xs flex justify-between text-gray-400">
                                <span>${item.game} · ${item.product}</span>
                                <span class="font-mono">${item.playerId}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSearch() { document.getElementById('searchBar').classList.toggle('hidden'); }
        function handleSearch(val) { renderGames(val); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
