<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NICK · topup hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #070b10;
            color: #fff;
            min-height: 100vh;
        }

        /* ===== MOBILE FIRST ===== */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 480px) {
            .game-grid { gap: 16px; }
        }

        @media (min-width: 640px) {
            .game-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 1024px) {
            .game-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* cards — fat, tappable, minimal */
        .game-card {
            background: #131a24;
            border-radius: 24px;
            padding: 16px 12px 14px 12px;
            border: 1px solid #253241;
            box-shadow: 0 6px 0 #0b1117;
            transition: 0.1s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .game-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0b1117;
            background: #1a2431;
        }

        .denom-card {
            background: #121b26;
            border: 1.5px solid #283340;
            border-radius: 22px;
            padding: 18px 8px;
            box-shadow: 0 5px 0 #0a1017;
            transition: 0.08s linear;
            cursor: pointer;
        }
        .denom-card:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a1017;
            background: #1e2b3a;
        }
        .denom-card.selected {
            background: #1f3145;
            border-color: #3f8cff;
            box-shadow: 0 5px 0 #1a3350;
        }
        .denom-card * { pointer-events: none; }

        /* category pills – big friendly tap */
        .cat-pill {
            background: #131e2b;
            border: 1px solid #2e3f52;
            color: #deecff;
            font-weight: 600;
            padding: 14px 26px;
            border-radius: 60px;
            font-size: 1rem;
            box-shadow: 0 4px 0 #0b121a;
            transition: 0.1s;
            cursor: pointer;
            white-space: nowrap;
            display: inline-block;
        }
        .cat-pill.active {
            background: #3f8cff;
            border-color: #90bdff;
            color: white;
            box-shadow: 0 4px 0 #2050a0;
        }
        .cat-pill:active { transform: translateY(3px); box-shadow: 0 1px 0 #0b121a; }

        /* bottom modal (mobile optimized) */
        .modal-content {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111b27;
            border-radius: 38px 38px 0 0;
            border-top: 3px solid #3f8cff;
            max-height: 88vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 1001;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            box-shadow: 0 -10px 40px black;
        }
        .modal-content.active { transform: translateY(0); }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: #0f1822;
            border-left: 3px solid #3f8cff;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }
        @media (min-width: 480px) { .cart-sidebar { max-width: 420px; } }
        .cart-sidebar.active { transform: translateX(0); }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
        }
        .modal-overlay.active { display: block; }

        .toast {
            position: fixed; bottom: 30px; left: 16px; right: 16px;
            background: #1d2d3f;
            color: white;
            padding: 18px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            z-index: 10000;
            transform: translateY(150%);
            transition: transform 0.25s;
            border: 1px solid #3f8cff;
            box-shadow: 0 10px 30px black;
            text-align: center;
        }
        .toast.show { transform: translateY(0); }

        /* input big & friendly */
        .input-big {
            background: #1b2735;
            border: 2px solid #2f4055;
            border-radius: 36px;
            padding: 20px 24px;
            font-size: 1.2rem;
            color: white;
            width: 100%;
        }
        .input-big:focus {
            border-color: #3f8cff;
            outline: none;
            background: #253342;
        }

        /* remove horizontal scroll */
        .category-scroll {
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-padding: 0 16px;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        /* bottom safe area */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 10px); }

        /* big fat buttons */
        .fat-button {
            background: #3f8cff;
            border: none;
            border-radius: 34px;
            padding: 22px;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 10px 0 #1b3d70;
            transition: 0.08s;
            width: 100%;
            color: white;
            cursor: pointer;
        }
        .fat-button:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #1b3d70;
        }

        .wa-button {
            background: #25D366;
            box-shadow: 0 8px 0 #128C7E;
            border-radius: 34px;
            padding: 22px;
            font-weight: 800;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            cursor: pointer;
        }
        .wa-button:active { transform: translateY(5px); box-shadow: 0 3px 0 #0e6b5e; }

        .cart-item {
            background: #14202e;
            border-radius: 28px;
            padding: 18px;
            border: 1px solid #26384b;
        }
    </style>
</head>
<body>

    <!-- LOADING (fast) -->
    <div id="loadingScreen" style="position:fixed; inset:0; background:#070b10; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="text-center">
            <div class="w-24 h-24 border-4 border-white/10 border-t-[#3f8cff] rounded-full animate-spin mx-auto mb-7"></div>
            <h1 class="text-5xl font-black tracking-tight text-white">NICK</h1>
            <p class="text-gray-400 mt-5 text-lg">loading store...</p>
        </div>
    </div>

    <!-- TOP BAR (solid, sticky) -->
    <div class="sticky top-0 z-50 bg-[#0a111a] border-b border-[#25394a] px-5 py-4">
        <div class="flex items-center justify-between">
            <div class="flex items-end gap-1" onclick="showView('games')">
                <span class="text-3xl font-black text-white">NICK<span class="text-[#3f8cff]">·</span></span>
                <span class="text-sm font-bold bg-[#3f8cff] text-white px-4 py-2 rounded-full">topup</span>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleSearch()" class="w-14 h-14 rounded-2xl bg-[#1f2e40] flex items-center justify-center active:bg-[#3f8cff]"><i class="fas fa-search text-2xl text-white/90"></i></button>
                <button onclick="openCart()" class="relative w-14 h-14 rounded-2xl bg-[#1f2e40] flex items-center justify-center active:bg-[#3f8cff]">
                    <i class="fas fa-shopping-cart text-2xl text-white/90"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-[#3f8cff] text-white text-sm font-bold w-7 h-7 flex items-center justify-center rounded-full border-2 border-[#0a111a]">0</span>
                </button>
                <button onclick="showView('history')" class="w-14 h-14 rounded-2xl bg-[#1f2e40] flex items-center justify-center active:bg-[#3f8cff]"><i class="fas fa-clock text-2xl text-white/90"></i></button>
            </div>
        </div>
        <div id="searchBar" class="hidden mt-4">
            <input type="text" id="gameSearch" oninput="handleSearch(this.value)" placeholder="🔍 search game" class="input-big">
        </div>
    </div>

    <main>
        <!-- GAMES VIEW -->
        <div id="view-games" class="max-w-7xl mx-auto p-5">
            <!-- simple hero -->
            <div class="bg-gradient-to-br from-[#142433] to-[#0a131f] rounded-[40px] p-8 mb-8 border border-[#2f4a62]">
                <h2 class="text-4xl font-black leading-tight">⚡ instant<br>top-up</h2>
                <p class="text-gray-300 text-lg mt-2">ML · Genshin · Valorant</p>
                <div class="flex gap-3 mt-6">
                    <span class="bg-black/40 text-white px-5 py-3 rounded-full text-sm font-semibold border border-white/20"><i class="fas fa-bolt mr-2"></i>2min</span>
                    <span class="bg-black/40 text-white px-5 py-3 rounded-full text-sm font-semibold border border-white/20"><i class="fas fa-shield mr-2"></i>secure</span>
                </div>
            </div>

            <!-- categories (bigger touch) -->
            <div class="category-scroll flex gap-3 mb-7 pb-2" id="categoryContainer"></div>

            <!-- game grid -->
            <div id="gameGrid" class="game-grid"></div>
            <div id="emptyState" class="hidden text-center py-32">
                <i class="fas fa-dragon text-7xl text-gray-700 mb-6"></i>
                <p class="text-gray-400 text-2xl">nothing found</p>
            </div>
        </div>

        <!-- HISTORY VIEW (mobile tight) -->
        <div id="view-history" class="hidden max-w-2xl mx-auto p-5">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="showView('games')" class="w-16 h-16 rounded-2xl bg-[#1f2e40] flex items-center justify-center active:bg-[#3f8cff]"><i class="fas fa-arrow-left text-3xl"></i></button>
                <h2 class="text-3xl font-bold text-white">📋 history</h2>
            </div>
            <div id="historyList" class="space-y-5"></div>
        </div>
    </main>

    <!-- PRODUCT MODAL (mobile big) -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="productModal" class="modal-content">
        <div class="p-6 pb-10">
            <div class="flex justify-between items-start mb-7">
                <div class="flex gap-5">
                    <div id="modalImg" class="w-24 h-24 rounded-3xl bg-cover bg-center border-2 border-[#3f8cff] shadow-2xl"></div>
                    <div class="pt-3">
                        <h3 id="modalTitle" class="text-2xl font-black">loading</h3>
                        <p id="modalCategory" class="text-gray-400 mt-2 flex items-center"><span class="w-2 h-2 bg-[#3f8cff] rounded-full mr-2"></span> game</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-14 h-14 rounded-full bg-[#263c50] flex items-center justify-center active:bg-[#3f8cff]"><i class="fas fa-times text-2xl"></i></button>
            </div>

            <div class="mb-8">
                <label class="text-sm font-bold text-gray-300 uppercase mb-3 block">🆔 player id</label>
                <input type="text" id="playerId" placeholder="e.g. 12345678" class="input-big">
            </div>

            <div class="mb-10">
                <label class="text-sm font-bold text-gray-300 uppercase mb-5 flex items-center gap-2"><i class="fas fa-cube text-[#3f8cff] text-lg"></i> pick package</label>
                <div id="denomGrid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <button onclick="addToCart()" class="fat-button">
                <i class="fas fa-cart-plus mr-3"></i> ADD TO CART
            </button>
            <p class="text-xs text-center text-gray-500 mt-6">✔️ instant · secure</p>
        </div>
    </div>

    <!-- CART (full width mobile) -->
    <div id="cartOverlay" class="modal-overlay" onclick="closeCart()"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="p-7 border-b border-white/20 flex justify-between items-center bg-[#0e1b28]">
            <h3 class="text-2xl font-bold flex items-center gap-3"><i class="fas fa-shopping-bag text-[#3f8cff]"></i> cart</h3>
            <button onclick="closeCart()" class="w-14 h-14 rounded-full bg-[#263c50] flex items-center justify-center active:bg-[#3f8cff]"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
        <div class="p-6 bg-[#0f1a26] border-t border-white/20 safe-bottom">
            <div class="flex justify-between items-center mb-6">
                <span class="text-2xl text-gray-300">total</span>
                <span id="cartTotal" class="text-4xl font-black text-white">RM 0</span>
            </div>
            <button onclick="checkout()" class="wa-button w-full">
                <i class="fab fa-whatsapp text-3xl"></i> WHATSAPP
            </button>
        </div>
    </div>

    <div id="toast" class="toast">✅ item added</div>

    <script>
        // === CONFIG ===
        const API_BASE = 'https://api-kryz-net-space.onrender.com/api/v1';
        const MARKUP = 0.03;   // 3%
        const WA_NUMBER = '60197661697';

        let allProducts = [], gamesList = [], cart = [], history = [], selectedGame = null, selectedProduct = null, currentCategory = 'all';

        try { cart = JSON.parse(localStorage.getItem('nick_cart_api')) || []; } catch { cart = []; }
        try { history = JSON.parse(localStorage.getItem('nick_history_api')) || []; } catch { history = []; }

        window.addEventListener('load', () => { fetchGames(); updateCartUI(); });

        function applyMarkup(price) { return Math.round(price * (1 + MARKUP) * 100) / 100; }

        async function fetchGames() {
            try {
                const res = await fetch(`${API_BASE}/public/games`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (data.success && data.games?.length) {
                    gamesList = data.games;
                    allProducts = gamesList.map(game => ({
                        id: `game-${game.slug}`,
                        name: game.name,
                        game: game.name,
                        price: 0,
                        category: game.category || 'Games',
                        image: `https://ui-avatars.com/api/?name=${encodeURIComponent(game.name)}&background=3f8cff&color=fff&size=200&bold=true&length=2`,
                        slug: game.slug,
                        isPlaceholder: true
                    }));
                    renderCategories(); renderGames();
                } else throw new Error();
            } catch {
                loadDemoData();
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        function loadDemoData() {
            allProducts = [
                { id:'ml1', name:'86 Diamonds', game:'Mobile Legends', price:12.90, category:'MOBA', image:'https://ui-avatars.com/api/?name=ML&background=3f8cff&color=fff&size=200&length=2' },
                { id:'ml2', name:'172 Diamonds', game:'Mobile Legends', price:24.90, category:'MOBA', image:'https://ui-avatars.com/api/?name=ML&background=3f8cff&color=fff' },
                { id:'gi1', name:'60 Crystals', game:'Genshin Impact', price:16.90, category:'RPG', image:'https://ui-avatars.com/api/?name=GI&background=3f8cff&color=fff' },
                { id:'val1', name:'575 Points', game:'Valorant', price:49.90, category:'Shooter', image:'https://ui-avatars.com/api/?name=VAL&background=3f8cff&color=fff' },
            ];
            renderCategories(); renderGames();
        }

        async function fetchGameDetails(slug) { try { const r=await fetch(`${API_BASE}/public/games/${slug}`); if(r.ok){const d=await r.json(); if(d.success) return d.game;}}catch(e){} return null; }

        function renderCategories() {
            const cats = ['all', ...new Set(allProducts.map(p => p.category))];
            document.getElementById('categoryContainer').innerHTML = cats.map(cat => 
                `<button onclick="setCategory('${cat}')" class="cat-pill ${currentCategory===cat?'active':''}">${cat==='all'?'🏆 ALL':cat}</button>`
            ).join('');
        }
        function setCategory(cat) { currentCategory=cat; renderCategories(); renderGames(); }

        function renderGames(search='') {
            const grid = document.getElementById('gameGrid');
            const gameMap = new Map();
            allProducts.forEach(p => { if (!gameMap.has(p.game)) gameMap.set(p.game, []); gameMap.get(p.game).push(p); });

            let gameEntries = Array.from(gameMap.entries()).map(([gameName, products]) => {
                const valid = products.filter(p => p.price>0).map(p=>p.price);
                const minPrice = valid.length ? Math.min(...valid) : 0;
                const first = products[0];
                return { name:gameName, products, minPrice, image:first.image, category:first.category, slug:first.slug };
            });

            if (currentCategory!=='all') gameEntries = gameEntries.filter(g => g.category === currentCategory);
            if (search) gameEntries = gameEntries.filter(g => g.name.toLowerCase().includes(search.toLowerCase()));
            gameEntries.sort((a,b) => a.minPrice - b.minPrice);

            if (!gameEntries.length) { grid.innerHTML=''; document.getElementById('emptyState').classList.remove('hidden'); return; }
            document.getElementById('emptyState').classList.add('hidden');

            grid.innerHTML = gameEntries.map(game => `
                <div class="game-card" onclick="openGame('${game.name.replace(/'/g, "\\'")}')">
                    <div class="aspect-square w-full rounded-2xl bg-cover bg-center mb-4 border-2 border-white/20 shadow-xl" style="background-image: url('${game.image}')"></div>
                    <div class="font-bold text-xl text-white truncate px-1">${game.name}</div>
                    <div class="flex justify-between items-center mt-3 px-1">
                        <span class="text-2xl font-black text-[#3f8cff]">${game.minPrice ? 'RM'+game.minPrice.toFixed(2) : '—'}</span>
                        <span class="text-sm bg-black/40 px-4 py-2 rounded-full border border-white/10"><i class="fas fa-bolt text-[#3f8cff] mr-1"></i>fast</span>
                    </div>
                    <span class="text-[0.6rem] text-gray-500 mt-2 block px-1">+3% service</span>
                </div>
            `).join('');
        }

        async function openGame(gameName) {
            const gameEntry = allProducts.find(p => p.game === gameName);
            if (!gameEntry) return;
            if (gameEntry.isPlaceholder && gameEntry.slug) {
                showToast('loading...');
                const details = await fetchGameDetails(gameEntry.slug);
                if (details) {
                    const newProducts = [];
                    if (details.services_by_type) {
                        Object.values(details.services_by_type).forEach(services => services.forEach(s => {
                            const base = parseFloat(s.price_myr) || 0;
                            newProducts.push({ id: s.id, name: s.name, game: details.name, price: applyMarkup(base), category: details.category||'Games', image: gameEntry.image, originalPrice: base });
                        }));
                    }
                    if (newProducts.length) {
                        allProducts = allProducts.filter(p => p.game !== gameName);
                        allProducts.push(...newProducts);
                        renderGames();
                        setTimeout(() => openGameModal(gameName), 150);
                        return;
                    }
                }
            }
            openGameModal(gameName);
        }

        function openGameModal(gameName) {
            const variants = allProducts.filter(p => p.game === gameName && p.price > 0);
            if (!variants.length) { showToast('no products'); return; }
            selectedGame = gameName;
            const gameData = variants[0];
            document.getElementById('modalTitle').innerText = gameName;
            document.getElementById('modalCategory').innerText = gameData.category;
            document.getElementById('modalImg').style.backgroundImage = `url('${gameData.image}')`;
            document.getElementById('playerId').value = '';

            variants.sort((a,b) => a.price - b.price);
            let html = '';
            variants.forEach(p => {
                html += `<div id="btn-${p.id}" class="denom-card" onclick="event.stopPropagation(); selectProduct('${p.id}');">`;
                html += `<span class="text-lg font-semibold text-white/90 mb-2">${p.name}</span>`;
                html += `<span class="text-3xl font-black text-white">RM ${p.price.toFixed(2)}</span>`;
                if(p.originalPrice) html += `<span class="text-[0.6rem] text-gray-400 mt-2">base RM${p.originalPrice.toFixed(2)}</span>`;
                html += `</div>`;
            });
            document.getElementById('denomGrid').innerHTML = html;
            if (variants.length) selectProduct(variants[0].id);

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('productModal').classList.add('active');
        }

        function selectProduct(id) { if(event) event.stopPropagation();
            document.querySelectorAll('.denom-card').forEach(c=>c.classList.remove('selected'));
            const card = document.getElementById(`btn-${id}`); if(card) card.classList.add('selected');
            selectedProduct = allProducts.find(p => p.id === id);
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); document.getElementById('productModal').classList.remove('active'); }

        function addToCart() {
            const pid = document.getElementById('playerId').value.trim();
            if (!pid) return showToast('❌ enter player id');
            if (!selectedProduct) return showToast('❌ select package');
            cart.push({ cartId: Date.now() + Math.random(), game: selectedGame, product: selectedProduct.name, price: selectedProduct.price, playerId: pid, image: selectedProduct.image });
            saveCart(); closeModal(); showToast('✅ added'); updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems'), totalEl = document.getElementById('cartTotal');
            document.getElementById('cartCount').innerText = cart.length;
            if (!cart.length) {
                container.innerHTML = `<div class="text-center py-24 text-gray-400 bg-[#172433] rounded-3xl"><i class="fas fa-box-open text-7xl mb-5 opacity-40"></i><p class="text-2xl">empty</p></div>`;
                totalEl.innerText = 'RM 0.00'; return;
            }
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="cart-item flex gap-5 items-center">
                    <img src="${item.image}" class="w-20 h-20 rounded-xl border-2 border-[#3f8cff]/60">
                    <div class="flex-1"><div class="font-bold text-xl">${item.game}</div><div class="text-gray-400 text-base">${item.product}</div><div class="bg-black/30 text-[#b5d0ff] text-sm mt-3 px-5 py-2 rounded-full inline-block">${item.playerId}</div></div>
                    <div class="text-right"><span class="text-2xl font-black text-white">RM${item.price.toFixed(2)}</span><button onclick="removeFromCart(${item.cartId})" class="block mt-5 text-red-400 text-2xl bg-white/5 p-3 rounded-full active:bg-red-500/40"><i class="fas fa-trash"></i></button></div>
                </div>`;
            }).join('');
            totalEl.innerText = `RM ${total.toFixed(2)}`;
        }
        function removeFromCart(id) { cart = cart.filter(i=>i.cartId!==id); saveCart(); updateCartUI(); showToast('🗑️ removed'); }
        function saveCart() { localStorage.setItem('nick_cart_api', JSON.stringify(cart)); }
        function openCart() { document.getElementById('cartOverlay').classList.add('active'); document.getElementById('cartSidebar').classList.add('active'); }
        function closeCart() { document.getElementById('cartOverlay').classList.remove('active'); document.getElementById('cartSidebar').classList.remove('active'); }

        function checkout() {
            if (!cart.length) return showToast('cart empty');
            let msg = "*🛒 NICK ORDER*%0A"; let total = 0;
            cart.forEach((i,idx) => { msg += `%0A${idx+1}. *${i.game}*%0A   ➔ ${i.product}%0A   ➔ ID: ${i.playerId}%0A   ➔ RM ${i.price.toFixed(2)}%0A`; total += i.price; });
            msg += `%0A*💰 TOTAL: RM ${total.toFixed(2)}* (incl. 3%)`;
            const order = { id: Date.now(), items: [...cart], total, date: new Date().toLocaleDateString('en-MY') };
            history.unshift(order); localStorage.setItem('nick_history_api', JSON.stringify(history));
            cart = []; saveCart(); updateCartUI(); closeCart();
            window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
            showToast('📲 order sent');
        }

        function showView(view) { ['games','history'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden')); document.getElementById(`view-${view}`).classList.remove('hidden'); if(view==='history') renderHistory(); }
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (!history.length) { container.innerHTML = `<div class="text-center py-24 text-gray-400 bg-[#172433] rounded-3xl"><i class="fas fa-history text-7xl mb-5 opacity-40"></i><p class="text-2xl">no history</p></div>`; return; }
            container.innerHTML = history.map(o => `<div class="bg-[#1b283a] p-6 rounded-3xl"><div class="flex justify-between items-center mb-4"><span class="text-sm bg-black/40 px-5 py-2 rounded-full">📅 ${o.date}</span><span class="text-3xl font-black">RM${o.total?.toFixed(2)}</span></div>${o.items?.map(item => `<div class="flex justify-between text-base py-2 border-b border-white/5"><span>${item.game} · ${item.product}</span><span class="text-gray-400">${item.playerId}</span></div>`).join('')}</div>`).join('');
        }
        function toggleSearch() { document.getElementById('searchBar').classList.toggle('hidden'); }
        function handleSearch(val) { renderGames(val); }
        function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
    </script>
</body>
</html>
